<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#eef1f5; }
header { padding:15px; background:#1f2d3d; color:#fff; }
.header-cards { display:flex; gap:10px; margin-top:10px; }
.card-header { background:#273849; padding:10px; border-radius:8px; flex:1; text-align:center; }

.container { padding:15px; }
.card { background:#fff; padding:10px; border-radius:10px; margin-bottom:20px; }

table { width:100%; border-collapse: collapse; }
th, td { border:1px solid #ccc; padding:5px; font-size:11px; }
th { background:#34495e; color:#fff; }
td { text-align:right; }
td:first-child, th:first-child { text-align:left; }

#custosTable td:first-child, #custosTable th:first-child {
  position: sticky;
  left: 0;
  background: #fff;
}
#custosTable th:first-child {
  background:#34495e;
}
</style>
</head>

<body>

<header>
<h2>Dashboard Financeiro</h2>
<div class="header-cards">
<div class="card-header">Entradas<br><b id="entradas"></b></div>
<div class="card-header">Saídas<br><b id="saidas"></b></div>
<div class="card-header">Saldo<br><b id="saldo"></b></div>
</div>
</header>

<div class="container">

<div class="card">
<canvas id="grafico" height="120"></canvas>
</div>

<div class="card">
<h3>Resumo por Conta de Custo</h3>
<div style="overflow:auto">
<table id="custosTable"></table>
</div>
</div>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRsD4G1W9oEl5nBkP5W87dx4i09Z0OV517OPFugq4kGRcde4cKntNK4EVN3tviiQ7xhkU0kkD_OqcHB/pub?gid=1230270840&single=true&output=csv";

function parseCSV(text){
const linhas = text.split("\\n").map(l=>l.split(","));
const header = linhas[0];

return linhas.slice(1).map(l=>{
let obj={};
header.forEach((h,i)=> obj[h.trim().toLowerCase()] = l[i]);
return obj;
});
}

function moeda(v){
return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function num(v){
if(!v) return 0;
return parseFloat(v.replace(/\\./g,'').replace(',','.')) || 0;
}

fetch(URL)
.then(r=>r.text())
.then(text=>{
const dadosRaw = parseCSV(text);

const dados = dadosRaw.map(r=>({
data: new Date(r.data),
credito: num(r["crédito"]||r["credito"]),
debito: num(r["débito"]||r["debito"]),
descricao: r["descrição da conta de custo"] || r["descrição"] || "Sem descrição"
})).filter(r=>!isNaN(r.data));

// KPI
let e=0,s=0;
dados.forEach(r=>{e+=r.credito; s+=r.debito;});
document.getElementById("entradas").innerText = moeda(e);
document.getElementById("saidas").innerText = moeda(s);
document.getElementById("saldo").innerText = moeda(e-s);

// gráfico
let saldo=0,labels=[],valores=[];
dados.sort((a,b)=>a.data-b.data).forEach(r=>{
saldo+=r.credito-r.debito;
labels.push(r.data.toLocaleDateString());
valores.push(saldo);
});

new Chart(document.getElementById("grafico"),{
type:"line",
data:{labels,datasets:[{label:"Saldo",data:valores}]},
options:{maintainAspectRatio:false}
});

// tabela custos
let mapa={};

dados.forEach(r=>{
let d=r.data;
let y=d.getFullYear();
let m=d.getMonth();

if(!mapa[r.descricao]) mapa[r.descricao]={meses:Array(24).fill(null), totalSaida:0};

let idx = y==2025 ? m : y==2026 ? m+12 : null;

if(idx!==null){
if(mapa[r.descricao].meses[idx]==null) mapa[r.descricao].meses[idx]=0;
mapa[r.descricao].meses[idx]+=r.credito-r.debito;
mapa[r.descricao].totalSaida += r.debito;
}
});

// ordenar
let lista = Object.entries(mapa).sort((a,b)=>b[1].totalSaida-a[1].totalSaida);

// montar tabela
let meses=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

let html="<tr><th>Conta</th>";
meses.forEach(m=>html+=`<th>${m}/25</th>`);
meses.forEach(m=>html+=`<th>${m}/26</th>`);
html+="<th>Total</th></tr>";

lista.forEach(([k,v])=>{
let total=0;
html+=`<tr><td>${k}</td>`;
v.meses.forEach(x=>{
if(x!==null) total+=x;
html+=`<td>${x==null?\"\":moeda(x)}</td>`;
});
html+=`<td><b>${moeda(total)}</b></td></tr>`;
});

document.getElementById("custosTable").innerHTML = html;

});

</script>

</body>
</html>
